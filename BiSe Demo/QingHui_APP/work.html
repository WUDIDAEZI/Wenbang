<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>就业指导 - 青汇校园</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #2d80ce; }
        
        .func-container {
            width: 100%;
            height: 100vh;
            aspect-ratio: 9 / 16;
            margin: 0 auto;
            position: relative;
            background: url('work.jpg') no-repeat center center;  /* 替换为你的设计图 */
            background-size: contain;
            background-color: #2d80ce;
        }
        
        /* 返回热区（左上角） */
        .back-hotspot {
            position: absolute;
            left: 3%;
            top: 2.6%;
            width: 10%;
            height: 7%;
            background: transparent;
            cursor: pointer;
        }
        
        /* 调试模式 */
        .debug .back-hotspot {
            background: rgba(255, 0, 0, 0.3);
            border: 2px solid yellow;
        }
        .debug .func-container {
            outline: 2px solid cyan;
        }
        
        .debug-panel {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 999;
            font-family: monospace;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="func-container" id="funcPage">
    <div class="back-hotspot" id="backBtn"></div>
</div>

<div class="debug-panel" id="debugToggle">🔧 调试模式: OFF</div>

<script>
    const container = document.getElementById('funcPage');
    const debugBtn = document.getElementById('debugToggle');
    let debugMode = false;
    
    // 返回主页
    document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'main.html';
    });
    
    // 调试模式
    function toggleDebug() {
        debugMode = !debugMode;
        if (debugMode) {
            container.classList.add('debug');
            debugBtn.innerHTML = '🔧 调试模式: ON (点击关闭)';
            debugBtn.style.background = 'rgba(255,0,0,0.8)';
        } else {
            container.classList.remove('debug');
            debugBtn.innerHTML = '🔧 调试模式: OFF (点击开启)';
            debugBtn.style.background = 'rgba(0,0,0,0.7)';
        }
    }
    debugBtn.addEventListener('click', toggleDebug);
</script>
</body>
</html>
